name: CI

on:
  push:
    branches:
      - master
      - '[0-9]+.[0-9]+.x'
  pull_request:
    branches:
      - master
      - '[0-9]+.[0-9]+.x'
  schedule:
    - cron: '0 18 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: '-Xmx4G -Xms1G -Djava.security.egd=file:/dev/./urandom'
  MAVEN_CLI_OPTS: '-B -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn'

jobs:
  incremental-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        uses: s4u/maven-settings-action@v3.0.0
        with:
          servers: |
            [{
              "id": "github",
              "username": "${{ github.actor }}",
              "password": "${{ secrets.GITHUB_TOKEN }}"
            }]
          repositories: |
            [{
              "id": "github",
              "url": "https://maven.pkg.github.com/codice/*",
              "snapshots": {"enabled": true}
            }]

      - name: Build
        run: mvn clean install $MAVEN_CLI_OPTS -DskipTests -pl '!docker'

  full-build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        uses: s4u/maven-settings-action@v3.0.0
        with:
          servers: |
            [{
              "id": "github",
              "username": "${{ github.actor }}",
              "password": "${{ secrets.GITHUB_TOKEN }}"
            }]
          repositories: |
            [{
              "id": "github",
              "url": "https://maven.pkg.github.com/codice/*",
              "snapshots": {"enabled": true}
            }]

      - name: Build
        run: mvn clean install $MAVEN_CLI_OPTS -DskipTests -pl '!docker'

  deploy:
    needs: full-build
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/master' || contains(github.ref, '.x'))
    runs-on: ubuntu-latest
    environment: production
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        uses: s4u/maven-settings-action@v3.0.0
        with:
          servers: |
            [{
              "id": "releases",
              "username": "${{ github.actor }}",
              "password": "${{ secrets.GITHUB_TOKEN }}"
            },
            {
              "id": "snapshots",
              "username": "${{ github.actor }}",
              "password": "${{ secrets.GITHUB_TOKEN }}"
            },
            {
              "id": "github",
              "username": "${{ github.actor }}",
              "password": "${{ secrets.GITHUB_TOKEN }}"
            }]
          repositories: |
            [{
              "id": "github",
              "url": "https://maven.pkg.github.com/codice/*",
              "snapshots": {"enabled": true}
            }]

      - name: Deploy
        run: |
          mvn deploy $MAVEN_CLI_OPTS \
            -DskipTests=true \
            -DretryFailedDeploymentCount=10 \
            -pl '!docker' \
            -DaltReleaseDeploymentRepository=releases::https://maven.pkg.github.com/codice/acdebugger \
            -DaltSnapshotDeploymentRepository=snapshots::https://maven.pkg.github.com/codice/acdebugger
